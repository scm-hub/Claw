
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>价目表诊断</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:600px;margin:auto}
.test-btn{padding:12px 20px;margin:8px;background:#1a73e8;color:white;border:none;border-radius:6px;cursor:pointer}
.result{background:#f5f5f5;padding:12px;margin:12px 0;border-radius:6px;font-family:monospace}
</style>
</head>
<body>
<h2>价目表功能诊断</h2>

<button class="test-btn" onclick="testNavigate()">测试 navigate('price')</button>
<button class="test-btn" onclick="testRenderPrice()">测试 renderCustomerPrice()</button>
<button class="test-btn" onclick="testAddMaterial()">测试 addMaterialPrice()</button>

<div id="result"></div>

<script>
function testNavigate(){
  try {
    if(typeof navigate === 'function'){
      navigate('price');
      showResult('✓ navigate函数存在，已调用 navigate("price")');
    } else {
      showResult('✗ navigate函数未定义');
    }
  } catch(e){
    showResult('✗ navigate调用失败: ' + e.message);
  }
}

function testRenderPrice(){
  try {
    if(typeof renderCustomerPrice === 'function'){
      renderCustomerPrice();
      showResult('✓ renderCustomerPrice函数存在，已调用');
    } else {
      showResult('✗ renderCustomerPrice函数未定义');
    }
  } catch(e){
    showResult('✗ renderCustomerPrice调用失败: ' + e.message);
  }
}

function testAddMaterial(){
  try {
    if(typeof addMaterialPrice === 'function'){
      addMaterialPrice();
      showResult('✓ addMaterialPrice函数存在，已调用');
    } else {
      showResult('✗ addMaterialPrice函数未定义');
    }
  } catch(e){
    showResult('✗ addMaterialPrice调用失败: ' + e.message);
  }
}

function showResult(msg){
  document.getElementById('result').innerHTML = '<div class="result">' + msg + '</div>';
  console.log('诊断结果:', msg);
}
</script>

<p>请点击上方按钮测试相关函数是否存在，查看控制台输出。</p>
</body>
</html>
