// ==================== 初始化 ====================
// ==================== AI 助手 ====================
(function(){
  var AI={};

  // 持久化：API 配置
  AI.loadConfig=function(){
    try{
      var raw=localStorage.getItem('scm_ai_config');
      if(raw)return JSON.parse(raw);
    }catch(e){}
    return {apiUrl:'/api/ai/chat',apiKey:'scm-auto',model:'meta/llama-3.1-70b-instruct'};
  };
  AI.saveConfig=function(cfg){
    localStorage.setItem('scm_ai_config',JSON.stringify(cfg));
  };

  // 持久化：对话历史
  AI.loadHistory=function(){
    try{
      var raw=sessionStorage.getItem('scm_ai_history');
      if(raw)return JSON.parse(raw);
    }catch(e){}
    return [];
  };
  AI.saveHistory=function(msgs){
    sessionStorage.setItem('scm_ai_history',JSON.stringify(msgs));
  };
  AI.history=AI.loadHistory();

  // 是否正在等待回复
  AI.waitingReply=false;

  // 语音相关
  AI.recognition=null;
  AI.isListening=false;
  AI.speechSupported=false;

  // ==================== 数据上下文构建 ====================
  AI.buildContext=function(){
    var tab=currentTab;
    var ctx='当前模块：';
    var tabNames={customer:'客户管理',order:'订单管理',sales:'销售计划',purchase:'采购计划'};
    ctx+=tabNames[tab]||tab;
    ctx+='\n\n数据摘要：\n';

    // 客户
    var customers=data.customers||[];
    var customerTotal=customers.length;
    var levelCounts={};
    var cooperating=customers.filter(function(c){return c.status==='合作中';}).length;
    customers.forEach(function(c){
      var lv=c.level||'未知';
      levelCounts[lv]=(levelCounts[lv]||0)+1;
    });
    ctx+='- 客户总数：'+customerTotal+'\n';
    Object.keys(levelCounts).forEach(function(lv){
      ctx+='  - '+lv+'级客户：'+levelCounts[lv]+'\n';
    });
    ctx+='- 合作中客户：'+cooperating+'\n';

    // 订单
    var orders=data.orders||[];
    var orderTotal=orders.length;
    var statusCounts={};
    var totalAmount=0;
    orders.forEach(function(o){
      var st=o.status||'未知';
      statusCounts[st]=(statusCounts[st]||0)+1;
      totalAmount+=o.amount||0;
    });
    ctx+='- 订单总数：'+orderTotal+'\n';
    Object.keys(statusCounts).forEach(function(st){
      ctx+='  - '+st+'：'+statusCounts[st]+'\n';
    });
    ctx+='- 订单总金额：'+(totalAmount/10000).toFixed(2)+'万元\n';

    // 销售计划
    var salesPlans=data.salesPlans||[];
    var salesTotal=salesPlans.length;
    var totalPlanQty=0,totalActualQty=0;
    salesPlans.forEach(function(s){
      totalPlanQty+=s.planQty||0;
      totalActualQty+=s.actualQty||0;
    });
    var salesRate=totalPlanQty>0?(totalActualQty/totalPlanQty*100).toFixed(1):'0.0';
    ctx+='- 销售计划总数：'+salesTotal+'\n';
    ctx+='- 计划总量：'+totalPlanQty.toLocaleString()+'\n';
    ctx+='- 实际总量：'+totalActualQty.toLocaleString()+'\n';
    ctx+='- 整体达成率：'+salesRate+'%\n';

    // 采购计划
    var purchasePlans=data.purchasePlans||[];
    var purchaseTotal=purchasePlans.length;
    var pendingApproval=purchasePlans.filter(function(p){return p.status==='待审批';}).length;
    ctx+='- 采购计划数：'+purchaseTotal+'\n';
    ctx+='- 待审批数：'+pendingApproval+'\n';

    // 库存
    var inventory=data.inventory||[];
    var lowStock=inventory.filter(function(i){return i.status==='低库存';}).length;
    ctx+='- 库存项数：'+inventory.length+'\n';
    ctx+='- 低库存项数：'+lowStock+'\n';

    return ctx;
  };

  // ==================== AI API 调用 ====================
  AI.callAPI=function(userMsg,callback){
    var cfg=AI.loadConfig();
    if(!cfg.apiUrl||!cfg.apiKey){
      callback(null,'请先在设置中配置 API 地址和 Key');
      return;
    }
    var ctx=AI.buildContext();
    var systemPrompt='你是 SCM 供应链管理数据分析专家。你拥有丰富的采购、销售、库存和物流数据分析经验。请根据提供的当前模块数据上下文，对用户的问题给出专业、精准的数据分析建议。回答应简洁、基于数据、提供可操作的建议。';
    var fullMsg='数据上下文：\n'+ctx+'\n\n用户问题：'+userMsg;

    var body={
      model:cfg.model||'gpt-3.5-turbo',
      messages:[
        {role:'system',content:systemPrompt},
        {role:'user',content:fullMsg}
      ],
      temperature:0.7
    };

    var xhr=new XMLHttpRequest();
    xhr.open('POST',cfg.apiUrl,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('Authorization','Bearer '+cfg.apiKey);
    xhr.timeout=30000;
    xhr.onload=function(){
      if(xhr.status===200){
        try{
          var resp=JSON.parse(xhr.responseText);
          var content=resp.choices&&resp.choices[0]&&resp.choices[0].message?resp.choices[0].message.content:'';
          if(!content)content='AI 返回内容为空，请稍后重试。';
          callback(content,null);
        }catch(e){
          callback(null,'AI 响应解析失败');
        }
      }else{
        var errMsg='AI 服务暂不可用';
        try{
          var errResp=JSON.parse(xhr.responseText);
          if(errResp.error&&errResp.error.message)errMsg=errResp.error.message;
        }catch(e){}
        callback(null,errMsg+'，请检查 API 配置');
      }
    };
    xhr.onerror=function(){callback(null,'AI 服务暂不可用，请检查 API 配置');};
    xhr.ontimeout=function(){callback(null,'AI 服务响应超时，请稍后重试');};
    xhr.send(JSON.stringify(body));
  };

  // ==================== 消息渲染 ====================
  AI.renderMessages=function(){
    var container=document.getElementById('ai-messages');
    if(!container)return;
    var html='';
    AI.history.forEach(function(msg){
      var cls=msg.role==='user'?'user':'ai';
      html+='<div class="ai-msg '+cls+'"><div class="ai-msg-text">'+AI.escapeHtml(msg.content)+'</div></div>';
    });
    container.innerHTML=html;
    container.scrollTop=container.scrollHeight;
  };

  AI.escapeHtml=function(str){
    var div=document.createElement('div');
    div.textContent=str;
    return div.innerHTML.replace(/\n/g,'<br>');
  };

  AI.showTyping=function(){
    var container=document.getElementById('ai-messages');
    if(!container)return;
    var typingHtml='<div class="ai-msg ai" id="ai-typing-msg"><div class="ai-typing"><span></span><span></span><span></span></div></div>';
    container.insertAdjacentHTML('beforeend',typingHtml);
    container.scrollTop=container.scrollHeight;
  };

  AI.removeTyping=function(){
    var el=document.getElementById('ai-typing-msg');
    if(el)el.remove();
  };

  // ==================== 发送消息 ====================
  AI.sendMessage=function(text){
    if(!text||!text.trim())return;
    text=text.trim();
    if(AI.waitingReply)return;
    document.getElementById('ai-input').value='';
    AI.history.push({role:'user',content:text});
    AI.renderMessages();
    AI.hideQuickQuestions();
    AI.saveHistory();
    AI.waitingReply=true;
    AI.showTyping();
    AI.callAPI(text,function(reply,error){
      AI.removeTyping();
      AI.waitingReply=false;
      if(error){
        AI.history.push({role:'assistant',content:error});
      }else{
        AI.history.push({role:'assistant',content:reply});
        // 语音播报
        AI.speak(reply);
      }
      AI.renderMessages();
      AI.saveHistory();
    });
  };

  // ==================== 语音播报 ====================
  AI.speak=function(text){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var cleaned=text.replace(/[*_~`#]/g,'').replace(/\[.*?\]\(.*?\)/g,'').replace(/\n{2,}/g,'。').replace(/\n/g,'，');
    var u=new SpeechSynthesisUtterance(cleaned);
    u.lang='zh-CN';
    u.rate=1.0;
    u.pitch=1.0;
    window.speechSynthesis.speak(u);
  };

  // ==================== 语音识别 ====================
  AI.initSpeech=function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return false;
    AI.recognition=new SR();
    AI.recognition.lang='zh-CN';
    AI.recognition.interimResults=false;
    AI.recognition.continuous=false;
    AI.recognition.maxAlternatives=1;
    AI.recognition.onresult=function(event){
      var transcript='';
      for(var i=event.resultIndex;i<event.results.length;i++){
        transcript+=event.results[i][0].transcript;
      }
      if(transcript){
        document.getElementById('ai-input').value=transcript;
        AI.sendMessage(transcript);
      }
      AI.stopListening();
    };
    AI.recognition.onerror=function(event){
      AI.stopListening();
      if(event.error==='not-allowed'){
        document.getElementById('ai-voice-btn').classList.add('disabled');
      }
    };
    AI.recognition.onend=function(){
      AI.stopListening();
    };
    return true;
  };

  AI.startListening=function(){
    if(!AI.recognition||AI.isListening)return;
    try{
      AI.isListening=true;
      var micBtn=document.getElementById('ai-voice-btn');
      var fab=document.getElementById('ai-fab');
      var tip=document.getElementById('ai-listening-tip');
      micBtn.classList.add('recording');
      if(fab)fab.classList.add('recording');
      if(tip)tip.classList.add('show');
      AI.recognition.start();
    }catch(e){AI.stopListening();}
  };

  AI.stopListening=function(){
    AI.isListening=false;
    var micBtn=document.getElementById('ai-voice-btn');
    var fab=document.getElementById('ai-fab');
    var tip=document.getElementById('ai-listening-tip');
    micBtn.classList.remove('recording');
    if(fab)fab.classList.remove('recording');
    if(tip)tip.classList.remove('show');
    if(AI.recognition){
      try{AI.recognition.stop();}catch(e){}
    }
  };

  // ==================== 快捷问题 ====================
  AI.showQuickQuestions=function(){
    var container=document.getElementById('ai-quick-questions');
    if(!container)return;
    var questions=[
      {q:'分析客户采购趋势',label:'分析客户采购趋势'},
      {q:'库存预警分析',label:'库存预警分析'},
      {q:'本月销售TOP客户',label:'本月销售TOP客户'},
      {q:'客户分级建议',label:'客户分级建议'}
    ];
    container.style.display='flex';
    container.innerHTML=questions.map(function(item){
      return '<button class="ai-quick-btn" onclick="AI.sendMessage(\''+AI.escapeAttr(item.q)+'\')">'+AI.escapeHtml(item.label)+'</button>';
    }).join('');
  };

  AI.hideQuickQuestions=function(){
    var container=document.getElementById('ai-quick-questions');
    if(container)container.style.display='none';
  };

  AI.escapeAttr=function(str){
    return str.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  };

  // ==================== 设置面板 ====================
  AI.openSettings=function(){
    var cfg=AI.loadConfig();
    document.getElementById('ai-setting-url').value=cfg.apiUrl||'';
    document.getElementById('ai-setting-key').value=cfg.apiKey||'';
    document.getElementById('ai-setting-model').value=cfg.model||'meta/llama-3.1-70b-instruct';
    document.getElementById('ai-settings-overlay').classList.add('open');
  };

  AI.closeSettings=function(){
    document.getElementById('ai-settings-overlay').classList.remove('open');
  };

  AI.saveSettingsAction=function(){
    var cfg={
      apiUrl:document.getElementById('ai-setting-url').value.trim(),
      apiKey:document.getElementById('ai-setting-key').value.trim(),
      model:document.getElementById('ai-setting-model').value.trim()||'gpt-3.5-turbo'
    };
    if(!cfg.apiUrl){AI.showSettingsStatus('请输入 API 地址','error');return;}
    if(!cfg.apiKey){AI.showSettingsStatus('请输入 API Key','error');return;}
    AI.saveConfig(cfg);
    AI.showSettingsStatus('配置已保存','success');
    setTimeout(function(){AI.closeSettings();},800);
  };

  AI.showSettingsStatus=function(msg,type){
    var el=document.getElementById('ai-settings-status');
    el.textContent=msg;
    el.className='ai-settings-status '+type+' show';
    setTimeout(function(){el.className='ai-settings-status';},2500);
  };

  // ==================== 面板开关 ====================
  AI.openPanel=function(){
    document.getElementById('ai-panel').classList.add('open');
    AI.renderMessages();
    if(AI.history.length===0)AI.showQuickQuestions();
  };

  AI.closePanel=function(){
    document.getElementById('ai-panel').classList.remove('open');
  };

  AI.togglePanel=function(){
    if(document.getElementById('ai-panel').classList.contains('open')){
      AI.closePanel();
    }else{
      AI.openPanel();
    }
  };

  // ==================== 语音按钮点击 ====================
  AI.onVoiceClick=function(){
    if(document.getElementById('ai-voice-btn').classList.contains('disabled'))return;
    if(AI.isListening){
      AI.stopListening();
    }else{
      AI.startListening();
    }
  };

  // ==================== 输入回车发送 ====================
  AI.onInputKey=function(e){
    if(e.key==='Enter')AI.sendMessage(document.getElementById('ai-input').value);
  };

  // ==================== 初始化 ====================
  AI.init=function(){
    AI.speechSupported=AI.initSpeech();
    if(!AI.speechSupported){
      document.getElementById('ai-voice-btn').classList.add('disabled');
    }
  };

  // 挂载到全局
  window.AI=AI;
  AI.init();
})();


// 全局 API_BASE（登录模块依赖）
var API_BASE = (window.AndroidAPI && typeof window.AndroidAPI.getApiBase === 'function')
    ? window.AndroidAPI.getApiBase()
    : 'http://192.168.21.34:8750/api';

// ==================== 登录模块 ====================
function doLogin(){
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginErr');
  if(!u||!p){err.textContent='请输入用户名和密码';return;}
  btn.disabled=true;
  btn.innerHTML='<span class="login-loading"></span>登录中...';
  err.textContent='';
  fetch(API_BASE.replace(/\/api$/,'')+'/api/auth/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,password:p})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      localStorage.setItem('scm_token',d.token);
      localStorage.setItem('scm_user',JSON.stringify(d.user));
      document.getElementById('loginOverlay').style.display='none';
      document.getElementById('app-shell').style.display='flex';
      loadAllData();
    }else{
      err.textContent=d.detail||'用户名或密码错误';
    }
  }).catch(function(e){err.textContent='网络错误：'+e.message;})
  .finally(function(){btn.disabled=false;btn.textContent='登录';});
}

function checkLogin(){
  var token=localStorage.getItem('scm_token');
  if(!token){
    document.getElementById('loginOverlay').style.display='flex';
    document.getElementById('app-shell').style.display='none';
    return false;
  }
  // 尝试验证 token
  fetch(API_BASE.replace(/\/api$/,'')+'/api/auth/verify',{
    headers:{'Authorization':'Bearer '+token}
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      document.getElementById('loginOverlay').style.display='none';
      document.getElementById('app-shell').style.display='flex';
      loadAllData();
    }else{
      localStorage.removeItem('scm_token');
      localStorage.removeItem('scm_user');
      document.getElementById('loginOverlay').style.display='flex';
      document.getElementById('app-shell').style.display='none';
    }
  }).catch(function(){
    // 网络不通时仍放行（离线可用）
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('app-shell').style.display='flex';
    loadAllData();
  });
}

// 支持 Enter 键登录
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('loginOverlay').style.display!=='none'){
    doLogin();
  }
});
