# CI/CD Pipeline — 杭州鲜当家全品类食用菌综合管理平台
# 触发条件：push/PR 到 main 或 develop 分支

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # 1. 代码质量检查（并行：ESLint + Prettier）
  # ============================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings 50

      - name: Check Prettier formatting
        run: npx prettier --check "**/*.{js,jsx,json,css,md}" --ignore-path .gitignore

  # ============================================================
  # 2. 单元测试（并行：Vitest 运行所有测试）
  # ============================================================
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 为各子系统安装测试依赖
      - name: Install subsystem test deps
        run: |
          cd portal/server && npm ci 2>/dev/null || true
          cd ../../hrms/server && npm ci 2>/dev/null || true

      - name: Run tests
        run: npm test

  # ============================================================
  # 3. 安全审计（npm audit + 依赖检查）
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  # ============================================================
  # 4. 构建检查（确保各前端能正确构建）
  # ============================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    strategy:
      matrix:
        subsystem:
          - path: portal/client
            name: Portal
          - path: hrms/client
            name: HRMS
          - path: xdj-scm/client
            name: SCM
          - path: xdj-scm/mobile
            name: SCM-Mobile
          - path: mdm/client
            name: MDM
          - path: ai-service/client
            name: AI-Service
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build ${{ matrix.subsystem.name }}
        working-directory: ${{ matrix.subsystem.path }}
        run: |
          npm ci 2>/dev/null || npm install
          npm run build --if-present || echo "No build script for ${{ matrix.subsystem.name }}"
        continue-on-error: true

  # ============================================================
  # 5. Prisma 数据库迁移检查
  # ============================================================
  prisma-check:
    name: Prisma Schema Check
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        prisma_path:
          - portal/server
          - hrms/server
          - xdj-scm/server
          - mdm/server
          - workflow-engine/server
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Prisma CLI
        run: npm install prisma --no-save

      - name: Validate ${{ matrix.prisma_path }} schema
        working-directory: ${{ matrix.prisma_path }}
        run: npx prisma validate
        continue-on-error: true
